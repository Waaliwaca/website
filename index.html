<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Sweet 17th Dina!</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-soft: #ffc0cb;
            --pink-dark: #d63384;
            --bg-color: #fff5f8;
            --vintage-brown: #a36b77;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 245, 248, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            text-align: center;
        }

        .play-btn {
            background: var(--pink-dark);
            color: white;
            padding: 18px 35px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.4);
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(255,192,203,0.3), rgba(255,255,255,0.8));
            padding: 20px;
        }

        h1 {
            color: var(--pink-dark);
            font-size: 2.2rem;
            text-shadow: 2px 2px white;
            margin-bottom: 10px;
        }

        .music-card {
            background: var(--vintage-brown);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: white;
            width: 280px;
            margin-bottom: 25px;
        }

        .music-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
        }

        .music-info h4 { margin: 15px 0 5px; font-size: 1.2rem; }
        .music-info p { margin: 0; font-size: 0.9rem; opacity: 0.8; }

        .footer-note {
            color: var(--pink-dark);
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 400px;
            font-weight: 500;
            text-align: center;
        }

        .emoji { font-size: 1.5rem; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startSurprise()">
        <div class="play-btn animate__animated animate__pulse animate__infinite">
            Klik untuk Kejutan Dina ✨
        </div>
    </div>

    <header>
        <h1 class="animate__animated animate__fadeInDown">Happy 17th Birthday, Dina! ✨</h1>
        
        <div class="music-card animate__animated animate__zoomIn">
            <img src="dina.jpg" alt="Dina">
            <div class="music-info">
                <h4>Bersama Selamanya</h4>
                <p>Nadhif Basalamah</p>
            </div>
            <div style="margin-top:15px; font-size:1.5rem; letter-spacing:10px; opacity: 0.8;">
                ⏮ ⏸ ⏭
            </div>
        </div>

        <div class="footer-note animate__animated animate__fadeInUp animate__delay-1s">
            Dinaa happy birthday yaa 😁 <br>
            Semoga di lancarin segala urusannya semuaaa sehat sehat selalu ceriaa 
            <span class="emoji">😽</span>
        </div>

        <div style="display:none;">
            <div id="player"></div>
        </div>
    </header>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'nUv86H87_QY',
                playerVars: {
                    'autoplay': 0,
                    'loop': 1,
                    'playlist': 'nUv86H87_QY',
                    'start': 60 // Mulai dari detik ke-60 (Reff)
                }
            });
        }

        function startSurprise() {
            document.getElementById('overlay').style.display = 'none';
            if (player && player.playVideo) {
                player.playVideo();
            }
        }
    </script>

</body>
</html>
